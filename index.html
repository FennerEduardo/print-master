<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintMaster | Configurador de Impresión Premium</title>
    <meta name="description" content="Configura tus imágenes para impresión de pequeño y gran formato con precisión profesional.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Indie+Flower&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Izquierdo: Herramientas y Configuración -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-print"></i>
                <h1>Print<span>Master</span></h1>
            </div>

            <!-- Configuración de Papel -->
            <div class="sidebar-section">
                <h3><i class="fa-solid fa-file-lines"></i> Configuración de Papel</h3>
                <div class="control-group">
                    <label for="paper-size">Tamaño de Papel</label>
                    <select id="paper-size">
                        <optgroup label="Estándares Colombia / Latam">
                            <option value="pliego">Pliego (70x100 cm)</option>
                            <option value="medio-pliego">1/2 Pliego (50x70 cm)</option>
                            <option value="cuarto-pliego">1/4 Pliego (35x50 cm)</option>
                            <option value="octavo-pliego">1/8 Pliego (25x35 cm)</option>
                            <option value="oficio-col">Oficio CO (21.6x33 cm)</option>
                        </optgroup>
                        <optgroup label="Formatos Digitales / USA">
                            <option value="tabloide">Tabloide (27.9x43.2 cm)</option>
                            <option value="tabloide-extra">Tabloide Extra (30.4x45.7 cm)</option>
                            <option value="carta" selected>Carta (21.6x27.9 cm)</option>
                            <option value="legal">Legal US (21.6x35.6 cm)</option>
                        </optgroup>
                        <optgroup label="Serie ISO A">
                            <option value="a0">A0 (84.1x118.9 cm)</option>
                            <option value="a1">A1 (59.4x84.1 cm)</option>
                            <option value="a2">A2 (42x59.4 cm)</option>
                            <option value="a3">A3 (29.7x42 cm)</option>
                            <option value="a4">A4 (21x29.7 cm)</option>
                        </optgroup>
                        <option value="custom">Personalizado...</option>
                    </select>
                </div>

                <div id="custom-size-controls" class="control-group hidden">
                    <div class="dual-input">
                        <div>
                            <label>Ancho (cm)</label>
                            <input type="number" id="custom-width" value="21.6" step="0.1">
                        </div>
                        <div>
                            <label>Alto (cm)</label>
                            <input type="number" id="custom-height" value="27.9" step="0.1">
                        </div>
                    </div>
                </div>

                <div class="control-group">
                    <label>Orientación</label>
                    <div class="toggle-group">
                        <button id="btn-portrait" class="active" title="Vertical">
                            <i class="fa-solid fa-arrows-up-down"></i> Vertical
                        </button>
                        <button id="btn-landscape" title="Horizontal">
                            <i class="fa-solid fa-arrows-left-right"></i> Horizontal
                        </button>
                    </div>
                </div>

                <div class="control-group">
                    <label>Margen (mm)</label>
                    <input type="range" id="paper-margin" min="0" max="50" value="5">
                    <span id="margin-value">5 mm</span>
                </div>

                <div class="preferences-actions">
                    <button id="btn-save-prefs" class="btn-save-prefs" title="Guardar preferencias">
                        <i class="fa-solid fa-floppy-disk"></i> Guardar
                    </button>
                    <button id="btn-clear-prefs" class="btn-clear-prefs" title="Borrar preferencias guardadas">
                        <i class="fa-solid fa-rotate-left"></i> Resetear
                    </button>
                </div>
            </div>

            <!-- Imágenes: Galería + Canvas -->
            <div class="sidebar-section" style="flex: 1; min-height: 0; display: flex; flex-direction: column;">
                <h3><i class="fa-solid fa-images"></i> Imágenes</h3>
                <div class="upload-area" id="drop-zone">
                    <input type="file" id="file-input" multiple accept="image/*" hidden>
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p>Arrastra imágenes o haz clic aquí</p>
                </div>

                <!-- Galería / Biblioteca -->
                <div class="gallery-section">
                    <div class="gallery-header">
                        <span><i class="fa-solid fa-photo-film"></i> Biblioteca <span id="gallery-count" class="gallery-count">0</span></span>
                        <div class="gallery-actions">
                            <button id="btn-add-all" title="Agregar todas al canvas"><i class="fa-solid fa-plus"></i> Todas</button>
                            <button id="btn-clear-gallery" title="Vaciar biblioteca"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                    </div>
                    <div id="gallery-grid" class="gallery-grid"></div>
                    <div id="gallery-empty" class="empty-state">
                        <i class="fa-solid fa-photo-film"></i>
                        Importa imágenes para empezar
                    </div>
                </div>

                <!-- Imágenes en Canvas -->
                <div class="canvas-images-header">
                    <span><i class="fa-solid fa-layer-group"></i> En Canvas <span id="canvas-count" class="canvas-count">0</span></span>
                </div>
                <div id="image-list" class="image-list"></div>
                <div id="canvas-empty" class="empty-state">
                    <i class="fa-solid fa-arrow-up"></i>
                    Agrega imágenes desde la biblioteca
                </div>
            </div>

            <!-- Se removió el panel de propiedades -->

            <div class="sidebar-footer">
                <button id="export-pdf" class="btn-primary">
                    <i class="fa-solid fa-file-pdf"></i> Exportar PDF
                </button>
                <button id="reset-canvas" class="btn-secondary">
                    <i class="fa-solid fa-trash-can"></i> Limpiar Todo
                </button>
            </div>
        </aside>

        <!-- Área Principal: Lienzos -->
        <main class="canvas-area">
            <div id="canvas-scroll-container">
                <div id="pages-container">
                    <!-- Las páginas se inyectarán aquí -->
                </div>
                <div class="add-page-wrapper">
                    <button id="btn-add-page" class="btn-add-page">
                        <i class="fa-solid fa-file-circle-plus"></i> Nueva Página
                    </button>
                </div>
            </div>
            
            <!-- Barra de estado / Herramientas -->
            <div class="status-bar">
                <div class="zoom-controls">
                    <button id="zoom-out"><i class="fa-solid fa-minus"></i></button>
                    <span id="zoom-level">100%</span>
                    <button id="zoom-in"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div class="selection-tools hidden" id="selection-tools">
                    <button id="btn-center-h" title="Centrar Horizontal"><i class="fa-solid fa-arrows-left-right-to-line"></i></button>
                    <button id="btn-center-v" title="Centrar Vertical"><i class="fa-solid fa-arrows-up-down-to-line"></i></button>
                    <div class="tool-separator"></div>
                    <button id="btn-duplicate" title="Duplicar"><i class="fa-solid fa-copy"></i></button>
                    <button id="btn-rotate" title="Rotar 90°"><i class="fa-solid fa-rotate"></i></button>
                    <button id="btn-layer-up" title="Traer al Frente"><i class="fa-solid fa-layer-group"></i></button>
                    <button id="btn-delete" title="Eliminar" class="danger"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
        </main>

        <!-- Menú Contextual Flotante (Propiedades) -->
        <div id="context-menu" class="context-menu hidden">
            <div class="context-header">
                <h3><i class="fa-solid fa-sliders"></i> Propiedades</h3>
                <div class="header-actions">
                    <select id="prop-unit" class="unit-select">
                        <option value="px">px</option>
                        <option value="cm">cm</option>
                        <option value="mm">mm</option>
                        <option value="in">pulg</option>
                    </select>
                    <button id="close-context-menu"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
            
            <div class="quad-input">
                <div class="input-group">
                    <label>Ancho</label>
                    <input type="number" id="prop-width" min="0" step="1">
                </div>
                <div class="input-group">
                    <label>Alto</label>
                    <input type="number" id="prop-height" min="0" step="1">
                </div>
                <div class="input-group">
                    <label>Pos X</label>
                    <input type="number" id="prop-x" step="1">
                </div>
                <div class="input-group">
                    <label>Pos Y</label>
                    <input type="number" id="prop-y" step="1">
                </div>
            </div>
            
            <div class="prop-row" style="margin-top: 0.5rem;">
                <label>Rotación</label>
                <input type="number" id="prop-rotation" min="0" max="360" step="90" style="width: 70px;">
                <span style="font-size: 0.75rem; color: var(--text-muted);">°</span>
                <button id="prop-lock-aspect" class="lock-btn locked" title="Bloquear proporción">
                    <i class="fa-solid fa-lock"></i>
                </button>
            </div>
            
            <hr class="prop-divider">
            
            <div class="filter-select-group">
                <label><i class="fa-solid fa-palette"></i> Filtro</label>
                <select id="prop-filter">
                    <option value="none">Sin filtro (Original)</option>
                    <option value="sepia">Sepia (Envejecido)</option>
                    <option value="grayscale">Blanco y Negro</option>
                    <option value="vintage">Vintage</option>
                    <option value="high-contrast">Alto Contraste</option>
                    <option value="warm">Cálido</option>
                    <option value="cold">Frío</option>
                </select>
            </div>

            <div class="checkbox-row">
                <input type="checkbox" id="prop-polaroid">
                <label for="prop-polaroid"><i class="fa-solid fa-camera-retro"></i> Polaroid</label>
            </div>

            <div id="prop-caption-group" class="control-group hidden">
                <label>Caption</label>
                <input type="text" id="prop-caption" placeholder="Texto del polaroid...">
            </div>

            <div class="format-actions">
                <button id="btn-copy-format" title="Copiar formato">
                    <i class="fa-solid fa-copy"></i> Copiar
                </button>
                <button id="btn-paste-format" title="Pegar formato" disabled>
                    <i class="fa-solid fa-paste"></i> Pegar
                </button>
                <button id="btn-apply-all-format" title="Aplicar formato a todas" disabled>
                    <i class="fa-solid fa-object-group"></i> A Todas
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
